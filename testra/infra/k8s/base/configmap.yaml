apiVersion: v1
kind: ConfigMap
metadata:
  name: testra-config
data:
  ENV: "production"
  PORT: "8080"
  REDIS_ADDR: "redis:6379"
  SMTP_HOST: "smtp"
  SMTP_PORT: "587"
  SMTP_FROM: "noreply@testra.local"
  ML_SERVICE_URL: "http://testra-ml:8000"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"
  IDEMPOTENCY_KEY_TTL_MINUTES: "1440"
  WORKER_POLL_INTERVAL_SECONDS: "5"
