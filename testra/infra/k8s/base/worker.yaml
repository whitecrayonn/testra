apiVersion: apps/v1
kind: Deployment
metadata:
  name: testra-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testra-worker
  template:
    metadata:
      labels:
        app: testra-worker
    spec:
      containers:
        - name: worker
          image: testra-worker:latest
          ports:
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: testra-config
            - secretRef:
                name: testra-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: testra-worker
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: testra-worker
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
