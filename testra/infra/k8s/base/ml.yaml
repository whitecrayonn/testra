apiVersion: apps/v1
kind: Deployment
metadata:
  name: testra-ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testra-ml
  template:
    metadata:
      labels:
        app: testra-ml
    spec:
      containers:
        - name: ml
          image: testra-ml:latest
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: testra-ml
spec:
  selector:
    app: testra-ml
  ports:
    - port: 80
      targetPort: 8000
