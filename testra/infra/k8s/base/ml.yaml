apiVersion: apps/v1
kind: Deployment
metadata:
  name: testra-ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testra-ml
  template:
    metadata:
      labels:
        app: testra-ml
    spec:
      containers:
        - name: ml
          image: testra-ml:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: testra-ml
spec:
  selector:
    app: testra-ml
  ports:
    - port: 80
      targetPort: 8000
