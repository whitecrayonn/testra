apiVersion: apps/v1
kind: Deployment
metadata:
  name: testra-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: testra-api
  template:
    metadata:
      labels:
        app: testra-api
    spec:
      containers:
        - name: api
          image: testra-api:latest
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - configMapRef:
                name: testra-config
            - secretRef:
                name: testra-secrets
