apiVersion: v1
kind: Secret
metadata:
  name: testra-secrets
  annotations:
    # Source of truth: inject values via Vault / external-secrets / Sealed Secrets.
    # Never commit real credential values to Git.
    testra.io/secret-source: "vault"
    testra.io/rotation-policy: "quarterly-or-on-leak"
type: Opaque
stringData:
  # PostgreSQL connection used by the API, worker, and migrator.
  # Must target an RLS-aware pooled role with sslmode=require and a bounded pool.
  # Example:
  #   postgres://testra_api:<random-pass>@prod-pgbouncer:5432/testra?sslmode=require&pool_max_conns=20&application_name=testra-api&search_path=public
  DATABASE_URL: ""

  # JWT signing secret. HS256/HS512 key; generate with:
  #   openssl rand -base64 64
  # Rotation: rotate before max token lifetime; dual-issue during grace window.
  JWT_SECRET: ""

  # Stripe live secret key. Restrict permissions to the minimum required
  # (e.g. read products/prices, create subscriptions, read customers).
  STRIPE_SECRET_KEY: ""

  # Stripe price ID for the production subscription tier.
  STRIPE_PRICE_ID: ""
