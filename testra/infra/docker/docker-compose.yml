services:
  postgres:
    image: postgres:16-alpine
    container_name: testra-postgres
    environment:
      POSTGRES_USER: testra
      POSTGRES_PASSWORD: testra
      POSTGRES_DB: testra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testra -d testra"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: testra-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: testra-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: testra-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: testra
      MINIO_ROOT_PASSWORD: testratestra
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: testra-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  ml:
    build:
      context: ../..
      dockerfile: infra/docker/ml.Dockerfile
    container_name: testra-ml
    ports:
      - "8000:8000"
    environment:
      - PORT=8000

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    container_name: testra-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://testra:testra@postgres:5432/testra?sslmode=disable
      - JWT_SECRET=local-dev-secret
      - ML_SERVICE_URL=http://ml:8000
      - STRIPE_SECRET_KEY=
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      ml:
        condition: service_started

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    container_name: testra-worker
    environment:
      - DATABASE_URL=postgres://testra:testra@postgres:5432/testra?sslmode=disable
      - ML_SERVICE_URL=http://ml:8000
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
    depends_on:
      postgres:
        condition: service_healthy

  migrator:
    build:
      context: ../..
      dockerfile: infra/docker/migrator.Dockerfile
    container_name: testra-migrator
    environment:
      - DATABASE_URL=postgres://testra:testra@postgres:5432/testra?sslmode=disable
      - MIGRATIONS_PATH=migrations
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    container_name: testra-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - api

volumes:
  postgres_data:
  clickhouse_data:
  minio_data:
