  /defects:
    post:
      tags:
        - Defects
      operationId: createDefect
      summary: Create a defect
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workspace_id
                - project_id
                - title
              properties:
                workspace_id:
                  type: string
                  format: uuid
                project_id:
                  type: string
                  format: uuid
                test_run_item_id:
                  type: string
                  format: uuid
                  nullable: true
                title:
                  type: string
                description:
                  type: string
                severity:
                  type: string
                  enum:
                    - low
                    - medium
                    - high
                    - critical
                  default: medium
                priority:
                  type: string
                  enum:
                    - low
                    - medium
                    - high
                    - critical
                  default: medium
                status:
                  type: string
                  enum:
                    - open
                    - in_progress
                    - resolved
                    - closed
                    - rejected
                  default: open
                assigned_to:
                  type: string
                  format: uuid
                  nullable: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Defect'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      tags:
        - Defects
      operationId: listDefects
      summary: List defects for a project with cursor pagination
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Defect'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
