openapi: 3.1.0
info:
  title: Testra API
  description: |
    Testra — One Platform. Every Test.
    RESTful JSON API for the Testra Quality Engineering Platform.
    All responses use a consistent envelope: `{ "data": ..., "meta": ..., "error": ... }`.
  version: 0.1.0
  contact:
    name: Testra Engineering
servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: https://staging.testra.io/api/v1
    description: Staging
  - url: https://api.testra.io/api/v1
    description: Production

tags:
  - name: Auth
    description: Registration, login, and current user
  - name: Organizations
    description: Tenant organizations
  - name: Workspaces
    description: Workspaces within an organization
  - name: Projects
    description: Projects within a workspace
  - name: MFA
    description: TOTP multi-factor authentication enrollment and management
  - name: Password Reset
    description: Password reset request and confirmation
  - name: API Keys
    description: Scoped API keys for automation and integrations

paths:
  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                name: { type: string }
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResult" }
        "409": { $ref: "#/components/responses/Conflict" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Authenticate with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /organizations:
    post:
      tags: [Organizations]
      operationId: createOrganization
      summary: Create an organization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name: { type: string }
                slug: { type: string }
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Organization" }
        "409": { $ref: "#/components/responses/Conflict" }
    get:
      tags: [Organizations]
      operationId: listOrganizations
      summary: List organizations for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Organizations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Organization" }

  /organizations/{id}:
    get:
      tags: [Organizations]
      operationId: getOrganization
      summary: Get an organization by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Organization" }
        "404": { $ref: "#/components/responses/NotFound" }

  /workspaces:
    post:
      tags: [Workspaces]
      operationId: createWorkspace
      summary: Create a workspace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organization_id, name, slug]
              properties:
                organization_id: { type: string, format: uuid }
                name: { type: string }
                slug: { type: string }
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Workspace" }
        "409": { $ref: "#/components/responses/Conflict" }
    get:
      tags: [Workspaces]
      operationId: listWorkspaces
      summary: List workspaces for an organization
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Workspaces
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Workspace" }

  /workspaces/{id}:
    get:
      tags: [Workspaces]
      operationId: getWorkspace
      summary: Get a workspace by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Workspace" }
        "404": { $ref: "#/components/responses/NotFound" }

  /projects:
    post:
      tags: [Projects]
      operationId: createProject
      summary: Create a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace_id, name, key]
              properties:
                workspace_id: { type: string, format: uuid }
                name: { type: string }
                key:
                  type: string
                  description: Short uppercase project key, e.g. "CORE"
                  pattern: "^[A-Z][A-Z0-9]{1,9}$"
                description: { type: string }
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Project" }
        "409": { $ref: "#/components/responses/Conflict" }
    get:
      tags: [Projects]
      operationId: listProjects
      summary: List projects for a workspace
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Project" }

  /projects/{id}:
    get:
      tags: [Projects]
      operationId: getProject
      summary: Get a project by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Project" }
        "404": { $ref: "#/components/responses/NotFound" }

  /auth/mfa/setup:
    post:
      tags: [MFA]
      operationId: setupMFA
      summary: Generate TOTP enrollment material
      security:
        - bearerAuth: []
      responses:
        "200":
          description: MFA enrollment material
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [secret, qr_code]
                        properties:
                          secret: { type: string }
                          qr_code: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/mfa/verify:
    post:
      tags: [MFA]
      operationId: verifyMFA
      summary: Verify and enable TOTP MFA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        "200":
          description: MFA enabled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, const: mfa_enabled }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/mfa/disable:
    post:
      tags: [MFA]
      operationId: disableMFA
      summary: Disable TOTP MFA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        "200":
          description: MFA disabled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, const: mfa_disabled }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/password-reset/request:
    post:
      tags: [Password Reset]
      operationId: requestPasswordReset
      summary: Request a password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Reset request accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, const: reset_email_sent }
        "400": { $ref: "#/components/responses/BadRequest" }

  /auth/password-reset/confirm:
    post:
      tags: [Password Reset]
      operationId: confirmPasswordReset
      summary: Confirm a password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token: { type: string }
                new_password: { type: string, minLength: 12 }
      responses:
        "200":
          description: Password reset completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, const: password_reset }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api-keys:
    post:
      tags: [API Keys]
      operationId: createAPIKey
      summary: Create a scoped API key
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace_id, name]
              properties:
                workspace_id: { type: string, format: uuid }
                name: { type: string }
                scopes:
                  type: array
                  items: { type: string }
      responses:
        "201":
          description: API key created; raw key is shown once
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [api_key, raw_key]
                        properties:
                          api_key: { $ref: "#/components/schemas/APIKey" }
                          raw_key: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    get:
      tags: [API Keys]
      operationId: listAPIKeys
      summary: List API keys for a workspace
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/APIKey" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api-keys/{id}:
    delete:
      tags: [API Keys]
      operationId: revokeAPIKey
      summary: Revoke an API key
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: API key revoked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, const: revoked }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:
    Envelope:
      type: object
      properties:
        data: {}
        meta: {}
        error:
          type: ["object", "null"]

    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }

    AuthResult:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }

    Organization:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }

    Workspace:
      type: object
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }

    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        key: { type: string }
        description: { type: string }

    APIKey:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        key_prefix: { type: string }
        scopes:
          type: array
          items: { type: string }
        last_used_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
