components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT access token. May be supplied via the `Authorization: Bearer <token>` header or the `testra_access_token` httpOnly cookie.'
    cookieAuth:
      type: apiKey
      in: cookie
      name: testra_access_token
      description: Short-lived JWT access token stored in an httpOnly, Secure, SameSite=Lax cookie.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CSRFTokenHeader:
      name: X-CSRF-Token
      in: header
      required: true
      description: Double-submit CSRF token value that must match the `testra_csrf_token` cookie. Required for all state-changing requests that use cookie authentication, except login, registration, refresh, and password reset.
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    APIKeyValuePair:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
        enabled:
          type: boolean
    APIAuthConfig:
      type: object
      properties:
        bearer_token:
          type: string
        username:
          type: string
        password:
          type: string
        api_key:
          type: string
        api_value:
          type: string
        api_location:
          type: string
          enum:
            - header
            - query
    APICollection:
