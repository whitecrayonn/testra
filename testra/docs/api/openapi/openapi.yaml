openapi: 3.1.0
info:
  title: Testra API
  description: |
    Testra — One Platform. Every Test.
    RESTful JSON API for the Testra Quality Engineering Platform.
    All responses use a consistent envelope: `{ "data": ..., "meta": ..., "error": ... }`.
  version: 0.5.0
  contact:
    name: Testra Engineering
servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: https://staging.testra.io/api/v1
    description: Staging
  - url: https://api.testra.io/api/v1
    description: Production
tags:
  - name: Auth
    description: Registration, login, and current user
  - name: Organizations
    description: Tenant organizations
  - name: Workspaces
    description: Workspaces within an organization
  - name: Projects
    description: Projects within a workspace
  - name: MFA
    description: TOTP multi-factor authentication enrollment and management
  - name: Password Reset
    description: Password reset request and confirmation
  - name: API Keys
    description: Scoped API keys for automation and integrations
  - name: Test Folders
    description: Hierarchical folders for organizing test suites and cases
  - name: Test Suites
    description: Collections of related test cases
  - name: Test Cases
    description: Test case management with versioning and full-text search
  - name: Notifications
    description: In-app notifications and delivery
  - name: Notification Preferences
    description: Per-user notification preferences
  - name: Notification Channels
    description: Workspace-scoped email, Slack, Teams and webhook channels
  - name: Defects
    description: Bug tracking and defect lifecycle
  - name: API Testing
    description: API request collections, environments, executions, and history
  - name: API Collections
    description: Group API requests into collections
  - name: API Folders
    description: Organize requests within a collection
  - name: API Environments
    description: Variable sets for request execution
  - name: API Requests
    description: Define and save HTTP requests
  - name: API Executions
    description: Run requests and inspect execution history
  - name: Automation Hub
    description: Automation projects, report imports, executions, artifacts, and logs
paths:
  /auth/register:
    post:
      tags:
        - Auth
      operationId: register
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 12
                  description: Minimum 12 characters
                name:
                  type: string
      responses:
        '201':
          description: User registered. Sets httpOnly `testra_access_token` and `testra_refresh_token` cookies.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Includes `testra_access_token` and `testra_refresh_token` cookies.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/login:
    post:
      tags:
        - Auth
      operationId: login
      summary: Authenticate with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Authenticated. Sets httpOnly `testra_access_token` and `testra_refresh_token` cookies.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Includes `testra_access_token` and `testra_refresh_token` cookies.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/refresh:
    post:
      tags:
        - Auth
      operationId: refreshToken
      summary: Exchange a refresh token for a new access token
      description: Reads the `testra_refresh_token` cookie by default, falling back to the `refresh_token` body field for non-browser clients. Rotates the refresh token and sets new httpOnly auth cookies.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New access and refresh tokens issued
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Includes rotated `testra_access_token` and `testra_refresh_token` cookies.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      tags:
        - Auth
      operationId: logout
      summary: End the current session
      description: Revokes the refresh token from the `testra_refresh_token` cookie (or body) and clears all auth cookies.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Session ended. Auth cookies are cleared.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Clears `testra_access_token`, `testra_refresh_token`, and `testra_csrf_token` cookies.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout-all:
    post:
      tags:
        - Auth
      operationId: logoutAll
      summary: End all sessions for the current user
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/CSRFTokenHeader'
      responses:
        '200':
          description: All sessions ended and auth cookies cleared.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Clears auth cookies.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /auth/csrf:
    get:
      tags:
        - Auth
      operationId: getCSRFToken
      summary: Get a CSRF token for cookie-based requests
      description: Returns a CSRF token and sets the `testra_csrf_token` cookie. Mutating requests must send the token in the `X-CSRF-Token` header.
      security: []
      responses:
        '200':
          description: CSRF token generated
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Sets the `testra_csrf_token` cookie.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          csrf_token:
                            type: string
  /auth/me:
    get:
      tags:
        - Auth
      operationId: getCurrentUser
      summary: Get the authenticated user
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /organizations:
    post:
      tags:
        - Organizations
      operationId: createOrganization
      summary: Create an organization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                slug:
                  type: string
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Organization'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags:
        - Organizations
      operationId: listOrganizations
      summary: List organizations for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Organizations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Organization'
  /organizations/{id}:
    get:
      tags:
        - Organizations
      operationId: getOrganization
      summary: Get an organization by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Organization
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Organization'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /workspaces:
    post:
      tags:
        - Workspaces
      operationId: createWorkspace
      summary: Create a workspace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - organization_id
                - name
                - slug
              properties:
                organization_id:
                  type: string
                  format: uuid
                name:
                  type: string
                slug:
                  type: string
      responses:
        '201':
          description: Workspace created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Workspace'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags:
        - Workspaces
      operationId: listWorkspaces
      summary: List workspaces for an organization
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Workspaces
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Workspace'
  /workspaces/{id}:
    get:
      tags:
        - Workspaces
      operationId: getWorkspace
      summary: Get a workspace by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Workspace
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Workspace'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects:
    post:
      tags:
        - Projects
      operationId: createProject
      summary: Create a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workspace_id
                - name
                - key
              properties:
                workspace_id:
                  type: string
                  format: uuid
                name:
                  type: string
                key:
                  type: string
                  description: Short uppercase project key, e.g. "CORE"
                  pattern: ^[A-Z][A-Z0-9]{1,9}$
                description:
                  type: string
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Project'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags:
        - Projects
      operationId: listProjects
      summary: List projects for a workspace
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Projects
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Project'
  /projects/{id}:
    get:
      tags:
        - Projects
      operationId: getProject
      summary: Get a project by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Project'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /auth/mfa/setup:
    post:
      tags:
        - MFA
      operationId: setupMFA
      summary: Generate TOTP enrollment material
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: MFA enrollment material
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - secret
                          - qr_code
                        properties:
                          secret:
                            type: string
                          qr_code:
                            type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      parameters:
        - $ref: '#/components/parameters/CSRFTokenHeader'
  /auth/mfa/verify:
    post:
      tags:
        - MFA
      operationId: verifyMFA
      summary: Verify and enable TOTP MFA
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        '200':
          description: MFA enabled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            const: mfa_enabled
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      parameters:
        - $ref: '#/components/parameters/CSRFTokenHeader'
  /auth/mfa/disable:
    post:
      tags:
        - MFA
      operationId: disableMFA
      summary: Disable TOTP MFA
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        '200':
          description: MFA disabled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            const: mfa_disabled
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      parameters:
        - $ref: '#/components/parameters/CSRFTokenHeader'
  /auth/password-reset/request:
    post:
      tags:
        - Password Reset
      operationId: requestPasswordReset
      summary: Request a password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset request accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            const: reset_email_sent
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/password-reset/confirm:
    post:
      tags:
        - Password Reset
      operationId: confirmPasswordReset
      summary: Confirm a password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - new_password
              properties:
                token:
                  type: string
                new_password:
                  type: string
                  minLength: 12
      responses:
        '200':
          description: Password reset completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            const: password_reset
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api-keys:
    post:
      tags:
        - API Keys
      operationId: createAPIKey
      summary: Create a scoped API key
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workspace_id
                - name
              properties:
                workspace_id:
                  type: string
                  format: uuid
                name:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: Optional expiry (default 90 days, max 365 days)
      responses:
        '201':
          description: API key created; raw key is shown once
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - api_key
                          - raw_key
                        properties:
                          api_key:
                            $ref: '#/components/schemas/APIKey'
                          raw_key:
                            type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      tags:
        - API Keys
      operationId: listAPIKeys
      summary: List API keys for a workspace
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: API keys
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/APIKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api-keys/{id}:
    delete:
      tags:
        - API Keys
      operationId: revokeAPIKey
      summary: Revoke an API key
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: API key revoked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            const: revoked
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /notifications:
    get:
      tags:
        - Notifications
      operationId: listNotifications
      summary: List notifications for the current user
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: read
          in: query
          schema:
            type: boolean
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Notification'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - Notifications
      operationId: createNotification
      summary: Create a notification for a user
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNotificationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Notification'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /notifications/unread-count:
    get:
      tags:
        - Notifications
      operationId: getUnreadCount
      summary: Count unread notifications
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      unread_count:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /notifications/{id}:
    patch:
      tags:
        - Notifications
      operationId: markNotificationRead
      summary: Mark a notification as read or unread
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
