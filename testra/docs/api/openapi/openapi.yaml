        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:
    Envelope:
      type: object
      properties:
        data: {}
        meta: {}
        error:
          type: ["object", "null"]

    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        mfa_enabled: { type: boolean }

    AuthResult:
      type: object
      properties:
        token: { type: string, description: JWT access token (15 min expiry) }
        refresh_token: { type: string, description: Opaque refresh token for token rotation }
        user: { $ref: "#/components/schemas/User" }

    Organization:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }

    Workspace:
      type: object
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }

    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        key: { type: string }
        description: { type: string }

    APIKey:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        name: { type: string }
        key_prefix: { type: string }
        scopes:
          type: array
          items: { type: string }
        expires_at: { type: string, format: date-time, nullable: true }
        last_used_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    PaginationMeta:
      type: object
      properties:
        next_cursor:
          type: string
          nullable: true
          description: Base64-encoded cursor for the next page; null if no more results
        has_more:
          type: boolean
          description: Whether more results exist beyond the current page

    TestFolder:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        parent_id: { type: string, format: uuid, nullable: true }
        name: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TestSuite:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        folder_id: { type: string, format: uuid, nullable: true }
        name: { type: string }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TestStep:
      type: object
      properties:
        order: { type: integer }
        action: { type: string }
        expected: { type: string }
        test_data: { type: string }

    TestCase:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        suite_id: { type: string, format: uuid, nullable: true }
        title: { type: string }
        description: { type: string }
        preconditions: { type: string }
        steps:
          type: array
          items: { $ref: '#/components/schemas/TestStep' }
        status:
          type: string
          enum: [draft, active, deprecated]
        priority:
          type: string
          enum: [low, medium, high, critical]
        tags:
          type: array
          items: { type: string }
        version: { type: integer }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TestCaseVersion:
      type: object
      properties:
        id: { type: string, format: uuid }
        test_case_id: { type: string, format: uuid }
        version: { type: integer }
        title: { type: string }
        description: { type: string }
        preconditions: { type: string }
        steps:
          type: array
          items: { $ref: '#/components/schemas/TestStep' }
        changed_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    TestRun:
      type: object
      properties:
        id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        suite_id: { type: string, format: uuid, nullable: true }
        name: { type: string }
        status: { type: string, enum: [pending, running, passed, failed, skipped, cancelled] }
        total: { type: integer }
        passed: { type: integer }
        failed: { type: integer }
        skipped: { type: integer }
        blocked: { type: integer }
        duration_ms: { type: integer, format: int64 }
        source: { type: string, enum: [manual, ci, api] }
        created_by: { type: string, format: uuid }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TestRunItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        test_case_id: { type: string, format: uuid, nullable: true }
        title: { type: string }
        status: { type: string, enum: [pending, running, passed, failed, skipped, blocked] }
        duration_ms: { type: integer, format: int64 }
        error_message: { type: string }
        stack_trace: { type: string }
        artifacts:
          type: array
          items: { type: string }
        sort_order: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateRunRequest:
      type: object
      required: [workspace_id, project_id, name]
      properties:
        workspace_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        suite_id: { type: string, format: uuid }
        name: { type: string }
        test_case_ids:
          type: array
          items: { type: string, format: uuid }
        source: { type: string, enum: [manual, ci, api] }

    UpdateRunStatusRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [pending, running, passed, failed, skipped, cancelled] }

    UpdateItemStatusRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [pending, running, passed, failed, skipped, blocked] }
        duration_ms: { type: integer, format: int64 }
        error_message: { type: string }
        stack_trace: { type: string }

    IngestRequest:
      type: object
      required: [workspace_id, project_id, name, format, payload]
      properties:
        workspace_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        suite_id: { type: string, format: uuid }
        name: { type: string }
        format: { type: string, enum: [junit, playwright, cypress] }
        payload: { type: string, description: Raw test result payload (JUnit XML, Playwright JSON, or Cypress JSON) }

    IngestResult:
      type: object
      properties:
        run_id: { type: string, format: uuid }
        total: { type: integer }
        passed: { type: integer }
        failed: { type: integer }
        skipped: { type: integer }
        duration_ms: { type: integer, format: int64 }

    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        type: { type: string, enum: [system, test_run_completed, defect_assigned, mention] }
        title: { type: string }
        body: { type: string }
        link: { type: string }
        read: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateNotificationRequest:
      type: object
      required: [user_id, type, title]
      properties:
        user_id: { type: string, format: uuid }
        type: { type: string, enum: [system, test_run_completed, defect_assigned, mention] }
        title: { type: string }
        body: { type: string }
        link: { type: string }

    NotificationPreferences:
      type: object
      properties:
        organization_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        in_app_enabled: { type: boolean }
        email_enabled: { type: boolean }
        slack_enabled: { type: boolean }
        teams_enabled: { type: boolean }
        webhook_enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    UpdatePreferencesRequest:
      type: object
      properties:
        in_app_enabled: { type: boolean }
        email_enabled: { type: boolean }
        slack_enabled: { type: boolean }
        teams_enabled: { type: boolean }
        webhook_enabled: { type: boolean }

    NotificationChannel:
      type: object
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        type: { type: string, enum: [email, slack, teams, webhook] }
        name: { type: string }
        config: { type: object, additionalProperties: { type: string } }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateChannelRequest:
      type: object
      required: [workspace_id, type, name, config]
      properties:
        workspace_id: { type: string, format: uuid }
        type: { type: string, enum: [email, slack, teams, webhook] }
        name: { type: string }
        config: { type: object, additionalProperties: { type: string } }

    UpdateChannelRequest:
      type: object
      properties:
        type: { type: string, enum: [email, slack, teams, webhook] }
        name: { type: string }
        config: { type: object, additionalProperties: { type: string } }

    Defect:
      type: object
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        test_run_item_id: { type: string, format: uuid, nullable: true }
        title: { type: string }
        description: { type: string }
        status: { type: string, enum: [open, in_progress, resolved, closed, rejected] }
        severity: { type: string, enum: [low, medium, high, critical] }
        priority: { type: string, enum: [low, medium, high, critical] }
        assigned_to: { type: string, format: uuid, nullable: true }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    UpdateDefectRequest:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        status: { type: string, enum: [open, in_progress, resolved, closed, rejected] }
        severity: { type: string, enum: [low, medium, high, critical] }
        priority: { type: string, enum: [low, medium, high, critical] }
