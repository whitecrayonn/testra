openapi: 3.1.0
info:
  title: Testra API
  description: |
    Testra — One Platform. Every Test.
    RESTful JSON API for the Testra Quality Engineering Platform.
    All responses use a consistent envelope: `{ "data": ..., "meta": ..., "error": ... }`.
  version: 0.5.0
  contact:
    name: Testra Engineering
servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: https://staging.testra.io/api/v1
    description: Staging
  - url: https://api.testra.io/api/v1
    description: Production

tags:
  - name: Auth
    description: Registration, login, and current user
  - name: Organizations
    description: Tenant organizations
  - name: Workspaces
    description: Workspaces within an organization
  - name: Projects
    description: Projects within a workspace
  - name: MFA
    description: TOTP multi-factor authentication enrollment and management
  - name: Password Reset
    description: Password reset request and confirmation
  - name: API Keys
    description: Scoped API keys for automation and integrations
  - name: Test Folders
    description: Hierarchical folders for organizing test suites and cases
  - name: Test Suites
    description: Collections of related test cases
  - name: Test Cases
    description: Test case management with versioning and full-text search
  - name: Notifications
    description: In-app notifications and delivery
  - name: Notification Preferences
    description: Per-user notification preferences
  - name: Notification Channels
    description: Workspace-scoped email, Slack, Teams and webhook channels
  - name: Defects
    description: Bug tracking and defect lifecycle

paths:
  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 12, description: Minimum 12 characters }
                name: { type: string }
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResult" }
        "409": { $ref: "#/components/responses/Conflict" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Authenticate with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Exchange a refresh token for a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: New access and refresh tokens
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /organizations:
    post:
      tags: [Organizations]
      operationId: createOrganization
      summary: Create an organization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name: { type: string }
                slug: { type: string }
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Organization" }
        "409": { $ref: "#/components/responses/Conflict" }
        "403": { $ref: "#/components/responses/Forbidden" }
    get:
      tags: [Organizations]
      operationId: listOrganizations
      summary: List organizations for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Organizations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Organization" }

  /organizations/{id}:
    get:
      tags: [Organizations]
      operationId: getOrganization
      summary: Get an organization by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Organization" }
        "404": { $ref: "#/components/responses/NotFound" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /workspaces:
    post:
      tags: [Workspaces]
      operationId: createWorkspace
      summary: Create a workspace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organization_id, name, slug]
              properties:
                organization_id: { type: string, format: uuid }
                name: { type: string }
                slug: { type: string }
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Workspace" }
        "409": { $ref: "#/components/responses/Conflict" }
        "403": { $ref: "#/components/responses/Forbidden" }
    get:
      tags: [Workspaces]
      operationId: listWorkspaces
      summary: List workspaces for an organization
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Workspaces
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Workspace" }

  /workspaces/{id}:
    get:
      tags: [Workspaces]
      operationId: getWorkspace
      summary: Get a workspace by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Workspace" }
        "404": { $ref: "#/components/responses/NotFound" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /projects:
    post:
      tags: [Projects]
      operationId: createProject
      summary: Create a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace_id, name, key]
              properties:
                workspace_id: { type: string, format: uuid }
                name: { type: string }
                key:
                  type: string
                  description: Short uppercase project key, e.g. "CORE"
                  pattern: "^[A-Z][A-Z0-9]{1,9}$"
                description: { type: string }
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Project" }
        "409": { $ref: "#/components/responses/Conflict" }
        "403": { $ref: "#/components/responses/Forbidden" }
    get:
      tags: [Projects]
      operationId: listProjects
      summary: List projects for a workspace
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Project" }

  /projects/{id}:
    get:
      tags: [Projects]
      operationId: getProject
      summary: Get a project by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Project" }
        "404": { $ref: "#/components/responses/NotFound" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /auth/mfa/setup:
    post:
      tags: [MFA]
      operationId: setupMFA
      summary: Generate TOTP enrollment material
      security:
        - bearerAuth: []
      responses:
        "200":
          description: MFA enrollment material
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [secret, qr_code]
                        properties:
                          secret: { type: string }
                          qr_code: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/mfa/verify:
    post:
      tags: [MFA]
      operationId: verifyMFA
      summary: Verify and enable TOTP MFA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        "200":
          description: MFA enabled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, const: mfa_enabled }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/mfa/disable:
    post:
      tags: [MFA]
      operationId: disableMFA
      summary: Disable TOTP MFA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        "200":
          description: MFA disabled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, const: mfa_disabled }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/password-reset/request:
    post:
      tags: [Password Reset]
      operationId: requestPasswordReset
      summary: Request a password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Reset request accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, const: reset_email_sent }
        "400": { $ref: "#/components/responses/BadRequest" }

  /auth/password-reset/confirm:
    post:
      tags: [Password Reset]
      operationId: confirmPasswordReset
      summary: Confirm a password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token: { type: string }
                new_password: { type: string, minLength: 12 }
      responses:
        "200":
          description: Password reset completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, const: password_reset }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api-keys:
    post:
      tags: [API Keys]
      operationId: createAPIKey
      summary: Create a scoped API key
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace_id, name]
              properties:
                workspace_id: { type: string, format: uuid }
                name: { type: string }
                scopes:
                  type: array
                  items: { type: string }
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: Optional expiry (default 90 days, max 365 days)
      responses:
        "201":
          description: API key created; raw key is shown once
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [api_key, raw_key]
                        properties:
                          api_key: { $ref: "#/components/schemas/APIKey" }
                          raw_key: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    get:
      tags: [API Keys]
      operationId: listAPIKeys
      summary: List API keys for a workspace
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/APIKey" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api-keys/{id}:
    delete:
      tags: [API Keys]
      operationId: revokeAPIKey
      summary: Revoke an API key
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: API key revoked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, const: revoked }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /notifications:
    get:
      tags: [Notifications]
      operationId: listNotifications
      summary: List notifications for the current user
      security: [{ bearerAuth: [] }]
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: read
          in: query
          schema: { type: boolean }
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Notification" }
                      meta: { $ref: "#/components/schemas/PaginationMeta" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '403': { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Notifications]
      operationId: createNotification
      summary: Create a notification for a user
      security: [{ bearerAuth: [] }]
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateNotificationRequest" }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Notification" }
        '400': { $ref: "#/components/responses/BadRequest" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '403': { $ref: "#/components/responses/Forbidden" }

  /notifications/unread-count:
    get:
      tags: [Notifications]
      operationId: getUnreadCount
      summary: Count unread notifications
      security: [{ bearerAuth: [] }]
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      unread_count: { type: integer }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '403': { $ref: "#/components/responses/Forbidden" }

  /notifications/{id}:
    patch:
      tags: [Notifications]
      operationId: markNotificationRead
      summary: Mark a notification as read or unread
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                read: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, const: updated }
        '400': { $ref: "#/components/responses/BadRequest" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '403': { $ref: "#/components/responses/Forbidden" }
        '404': { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Notifications]
      operationId: deleteNotification
      summary: Delete a notification
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, const: deleted }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '403': { $ref: "#/components/responses/Forbidden" }
        '404': { $ref: "#/components/responses/NotFound" }

  /notification-preferences:
    get:
      tags: [Notification Preferences]
      operationId: getNotificationPreferences
      summary: Get the current user's notification preferences
      security: [{ bearerAuth: [] }]
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/NotificationPreferences" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '403': { $ref: "#/components/responses/Forbidden" }
    put:
      tags: [Notification Preferences]
      operationId: updateNotificationPreferences
      summary: Update notification preferences
      security: [{ bearerAuth: [] }]
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePreferencesRequest" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/NotificationPreferences" }
        '400': { $ref: "#/components/responses/BadRequest" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '403': { $ref: "#/components/responses/Forbidden" }

  /notification-channels:
    get:
      tags: [Notification Channels]
      operationId: listNotificationChannels
      summary: List notification channels for a workspace
      security: [{ bearerAuth: [] }]
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/NotificationChannel" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '403': { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Notification Channels]
      operationId: createNotificationChannel
      summary: Create a notification channel
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateChannelRequest" }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/NotificationChannel" }
        '400': { $ref: "#/components/responses/BadRequest" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '403': { $ref: "#/components/responses/Forbidden" }

  /notification-channels/{id}:
    put:
      tags: [Notification Channels]
      operationId: updateNotificationChannel
      summary: Update a notification channel
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateChannelRequest" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/NotificationChannel" }
        '400': { $ref: "#/components/responses/BadRequest" }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '403': { $ref: "#/components/responses/Forbidden" }
        '404': { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Notification Channels]
      operationId: deleteNotificationChannel
      summary: Delete a notification channel
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, const: deleted }
        '401': { $ref: "#/components/responses/Unauthorized" }
        '403': { $ref: "#/components/responses/Forbidden" }
        '404': { $ref: "#/components/responses/NotFound" }

  /defects:
    post:
      tags: [Defects]
      operationId: createDefect
      summary: Create a defect
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace_id, project_id, title]
              properties:
                workspace_id: { type: string, format: uuid }
                project_id: { type: string, format: uuid }
                test_run_item_id: { type: string, format: uuid, nullable: true }
                title: { type: string }
                description: { type: string }
                severity: { type: string, enum: [low, medium, high, critical], default: medium }
                priority: { type: string, enum: [low, medium, high, critical], default: medium }
                status: { type: string, enum: [open, in_progress, resolved, closed, rejected], default: open }
                assigned_to: { type: string, format: uuid, nullable: true }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Defect' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    get:
      tags: [Defects]
      operationId: listDefects
      summary: List defects for a project with cursor pagination
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: cursor
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Defect' }
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /defects/{id}:
    get:
      tags: [Defects]
      operationId: getDefect
      summary: Get a defect by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Defect' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [Defects]
      operationId: updateDefect
      summary: Update a defect
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateDefectRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Defect' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [Defects]
      operationId: deleteDefect
