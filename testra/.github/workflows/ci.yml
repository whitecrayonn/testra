name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: apps/api/go.sum

      - name: Build
        run: go build ./apps/api/...
        working-directory: .

      - name: Vet
        run: go vet ./apps/api/...
        working-directory: .

      - name: Test
        run: go test -race -count=1 ./apps/api/...
        working-directory: .

  web:
    name: Web (typecheck, lint, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Build
        run: pnpm turbo run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  openapi:
    name: OpenAPI / SDK sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: apps/api/go.sum

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check OpenAPI drift against chi router
        run: node scripts/check-openapi-drift.mjs

      - name: Regenerate TypeScript SDK from OpenAPI
        run: pnpm --filter @testra/sdk generate

      - name: Typecheck SDK
        run: pnpm turbo run typecheck --filter @testra/sdk

  ml:
    name: ML (lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest
